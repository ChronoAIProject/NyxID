# NyxID application secrets
# IMPORTANT: Replace placeholder values before applying.
#
# Recommended approach -- create secrets via kubectl:
#   kubectl create secret generic nyxid-secrets \
#     --namespace nyxid \
#     --from-literal=DATABASE_URL='mongodb://nyxid:PASSWORD@nyxid-mongodb:27017/nyxid?authSource=admin' \
#     --from-literal=ENCRYPTION_KEY="$(openssl rand -hex 32)"
#
# For production, consider:
#   - External Secrets Operator with a secrets manager (Vault, AWS SM, etc.)
#   - Sealed Secrets for GitOps workflows
---
apiVersion: v1
kind: Secret
metadata:
  name: nyxid-secrets
  namespace: chronoai-platform
  labels:
    app.kubernetes.io/name: nyxid
type: Opaque
stringData:
  # mongodb://user:pass@nyxid-mongodb:27017/nyxid?authSource=admin
  DATABASE_URL: "REPLACE_ME"
  # 32-byte hex key (64 chars). Generate: openssl rand -hex 32
  ENCRYPTION_KEY: "REPLACE_ME"
  # SMTP configuration (optional -- uncomment if using email)
  # SMTP_HOST: "smtp.example.com"
  # SMTP_PORT: "587"
  # SMTP_USERNAME: ""
  # SMTP_PASSWORD: ""
  # SMTP_FROM_ADDRESS: "noreply@example.com"
  # Social login (optional -- uncomment if using)
  # GOOGLE_CLIENT_ID: ""
  # GOOGLE_CLIENT_SECRET: ""
  # GITHUB_CLIENT_ID: ""
  # GITHUB_CLIENT_SECRET: ""
---
# JWT RSA key pair -- create from files:
#   kubectl create secret generic nyxid-jwt-keys \
#     --namespace nyxid \
#     --from-file=private.pem=keys/private.pem \
#     --from-file=public.pem=keys/public.pem
apiVersion: v1
kind: Secret
metadata:
  name: nyxid-jwt-keys
  namespace: chronoai-platform
  labels:
    app.kubernetes.io/name: nyxid
type: Opaque
stringData:
  # Replace with actual PEM contents, or use kubectl create secret (recommended)
  private.pem: "REPLACE_ME_OR_USE_KUBECTL_CREATE_SECRET"
  public.pem: "REPLACE_ME_OR_USE_KUBECTL_CREATE_SECRET"
---
# MongoDB credentials
apiVersion: v1
kind: Secret
metadata:
  name: nyxid-mongo-secret
  namespace: chronoai-platform
  labels:
    app.kubernetes.io/name: nyxid
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "nyxid"
  # Replace with a strong password
  MONGO_INITDB_ROOT_PASSWORD: "REPLACE_ME"
