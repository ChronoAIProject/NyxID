# Ingress for NyxID
# Requires: nginx ingress controller (or adjust annotations for your controller)
#
# For TLS, either:
#   1. Use cert-manager with a ClusterIssuer (recommended)
#   2. Create TLS secrets manually:
#      kubectl create secret tls nyxid-backend-tls --cert=tls.crt --key=tls.key -n nyxid
#      kubectl create secret tls nyxid-frontend-tls --cert=tls.crt --key=tls.key -n nyxid
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nyxid-backend-ingress
  namespace: chronoai-platform
  labels:
    app.kubernetes.io/name: nyxid
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: nyxid
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # Uncomment for cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: nyx-api.chrono-ai.fun
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nyxid-backend
                port:
                  number: 3001
          - path: /oauth
            pathType: Prefix
            backend:
              service:
                name: nyxid-backend
                port:
                  number: 3001
          - path: /.well-known
            pathType: ImplementationSpecific
            backend:
              service:
                name: nyxid-backend
                port:
                  number: 3001
          - path: /health
            pathType: Exact
            backend:
              service:
                name: nyxid-backend
                port:
                  number: 3001
          - path: /mcp
            pathType: Exact
            backend:
              service:
                name: nyxid-backend
                port:
                  number: 3001
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nyxid-frontend-ingress
  namespace: chronoai-platform
  labels:
    app.kubernetes.io/name: nyxid
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: nyxid
  annotations:
    # Uncomment for cert-manager:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: nyx.chrono-ai.fun
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nyxid-frontend
                port:
                  number: 80
