apiVersion: v1
kind: ConfigMap
metadata:
  name: nyxid-config
  namespace: nyxid
  labels:
    app.kubernetes.io/name: nyxid
data:
  PORT: "3001"
  # Replace with your production URLs
  BASE_URL: "https://auth.example.com"
  FRONTEND_URL: "https://app.example.com"
  ENVIRONMENT: "production"
  # JWT
  JWT_ISSUER: "auth.example.com"
  JWT_PRIVATE_KEY_PATH: "/etc/nyxid/keys/private.pem"
  JWT_PUBLIC_KEY_PATH: "/etc/nyxid/keys/public.pem"
  JWT_ACCESS_TTL_SECS: "900"
  JWT_REFRESH_TTL_SECS: "604800"
  # Rate limiting
  RATE_LIMIT_PER_SECOND: "10"
  RATE_LIMIT_BURST: "30"
  # Logging
  RUST_LOG: "nyxid=info,tower_http=warn"
