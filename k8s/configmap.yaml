apiVersion: v1
kind: ConfigMap
metadata:
  name: nyxid-config
  namespace: chronoai-platform
  labels:
    app.kubernetes.io/name: nyxid
data:
  PORT: "3001"
  # Replace with your production URLs
  BASE_URL: "https://nyx-api.chrono-ai.fun"
  FRONTEND_URL: "https://nyx.chrono-ai.fun"
  ENVIRONMENT: "production"
  # JWT
  JWT_ISSUER: "nyxid"
  JWT_PRIVATE_KEY_PATH: "/etc/nyxid/keys/private.pem"
  JWT_PUBLIC_KEY_PATH: "/etc/nyxid/keys/public.pem"
  JWT_ACCESS_TTL_SECS: "900"
  JWT_REFRESH_TTL_SECS: "604800"
  # Database
  DATABASE_MAX_CONNECTIONS: "10"
  # Rate limiting
  RATE_LIMIT_PER_SECOND: "20"
  RATE_LIMIT_BURST: "50"
  # Logging
  RUST_LOG: "nyxid=info,tower_http=warn"
