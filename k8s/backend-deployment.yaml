apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyxid-backend
  namespace: chronoai-platform
  labels:
    app.kubernetes.io/name: nyxid-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: nyxid
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nyxid-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nyxid-backend
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: nyxid
    spec:
      containers:
        - name: backend
          image: us-central1-docker.pkg.dev/aelf-shared-k8s-prod/aelf-prod-registry/nyxid-backend:0.0.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nyxid-config
            - secretRef:
                name: nyxid-secrets
          volumeMounts:
            - name: jwt-keys
              mountPath: /etc/nyxid/keys
              readOnly: true
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: jwt-keys
          secret:
            secretName: nyxid-jwt-keys
            defaultMode: 0444
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nyxid-backend
  namespace: chronoai-platform
  labels:
    app.kubernetes.io/name: nyxid-backend
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: nyxid
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nyxid-backend
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
