apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyxid-frontend
  namespace: nyxid
  labels:
    app.kubernetes.io/name: nyxid-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: nyxid
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nyxid-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nyxid-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: nyxid
    spec:
      containers:
        - name: frontend
          image: nyxid-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: BACKEND_URL
              value: "http://nyxid-backend:3001"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: nyxid-frontend
  namespace: nyxid
  labels:
    app.kubernetes.io/name: nyxid-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: nyxid
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: nyxid-frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
