version: 2

updates:
  # Rust (backend + node-agent)
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust
    groups:
      rust-minor:
        update-types:
          - minor
          - patch

  # Frontend
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend
    groups:
      npm-minor:
        update-types:
          - minor
          - patch

  # SDK
  - package-ecosystem: npm
    directory: /sdk
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - sdk
    groups:
      sdk-minor:
        update-types:
          - minor
          - patch

  # Mobile
  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - mobile
    groups:
      mobile-minor:
        update-types:
          - minor
          - patch

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
